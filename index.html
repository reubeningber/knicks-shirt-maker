<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Knicks Shirt Maker — Make Your Own Custom Knicks Tee</title>
  <meta name="description" content="Make your own custom Knicks-style t-shirt inspired by Taylor Swift's viral STEVIE KNICKS shirt from the 2026 NBA Finals. Type your text, download your tee.">
  <meta name="keywords" content="Knicks shirt maker, custom Knicks tee, STEVIE KNICKS shirt, Taylor Swift Knicks, NBA Finals shirt, New York Knicks">
  <meta name="author" content="Reuben Ingber">
  <link rel="canonical" href="https://reubeningber.github.io/knicks-shirt-maker/">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://reubeningber.github.io/knicks-shirt-maker/">
  <meta property="og:title" content="Knicks Shirt Maker — Make Your Own Custom Knicks Tee">
  <meta property="og:description" content="Make your own custom Knicks-style t-shirt inspired by Taylor Swift's viral STEVIE KNICKS shirt from the 2026 NBA Finals.">
  <meta property="og:image" content="https://reubeningber.github.io/knicks-shirt-maker/assets/inspiration.webp">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://reubeningber.github.io/knicks-shirt-maker/">
  <meta name="twitter:title" content="Knicks Shirt Maker — Make Your Own Custom Knicks Tee">
  <meta name="twitter:description" content="Make your own custom Knicks-style t-shirt inspired by Taylor Swift's viral STEVIE KNICKS shirt from the 2026 NBA Finals.">
  <meta name="twitter:image" content="https://reubeningber.github.io/knicks-shirt-maker/assets/inspiration.webp">
  <meta name="twitter:creator" content="@reubeningber">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Graduate&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>KNICKS SHIRT MAKER</h1>
  <p class="tagline">Type your text &mdash; make your tee</p>

  <div class="card">
    <canvas id="c" width="500" height="570"></canvas>
  </div>

  <div class="controls">
    <div class="input-wrapper">
      <input
        id="txt"
        class="text-input"
        type="text"
        maxlength="22"
        placeholder="e.g. STEVIE KNICKS"
        autocomplete="off"
        spellcheck="false"
      >
      <button class="btn-wand" type="button" title="Random Knicks pun" aria-label="Random Knicks pun">✨</button>
    </div>
    <button class="btn-download" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
      </svg>
      DOWNLOAD SHIRT
    </button>
  </div>

  <!-- SoundCloud player — visually hidden but not display:none so the widget initialises -->
  <iframe
    id="sc-player"
    allow="autoplay"
    style="position:absolute;width:0;height:0;border:0;opacity:0;pointer-events:none;"
    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/vycebloom/new-york-groove-2026&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false"
  ></iframe>

  <!-- Floating sound toggle -->
  <button class="btn-sound" type="button" aria-label="Toggle music" title="Toggle music">
    <svg id="icon-on" viewBox="0 0 24 24" style="display:none">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
    <svg id="icon-off" viewBox="0 0 24 24" style="display:block">
      <path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
  </button>

  <p class="footer">
    Go Knicks &mdash; Let&rsquo;s Go New York<br>
    Made by <a href="https://instagram.com/reubeningber" target="_blank" rel="noopener">@reubeningber</a>
    &nbsp;&middot;&nbsp;
    <a href="https://github.com/ringber/knicks-shirt-maker" target="_blank" rel="noopener">View on GitHub</a>
  </p>

  <!-- SoundCloud Widget API -->
  <script src="https://w.soundcloud.com/player/api.js"></script>
  <!-- defer keeps execution after DOM ready and preserves load order -->
  <script defer src="shirt.js"></script>
  <script defer src="player.js"></script>

</body>
</html>
